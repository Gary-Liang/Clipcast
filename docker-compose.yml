version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: podcasttoclip-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: podcasttoclip
    ports:
      - "54320:5432"  # Use port 54320 to avoid all conflicts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d podcasttoclip"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: podcasttoclip_db_data
