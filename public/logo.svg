<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 640" width="512" height="640">
  <!-- Icon -->
  <g transform="translate(0, 0)">
    <!-- Audio bar 1 (left, medium height) -->
    <rect x="0" y="178" width="50" height="212" rx="8" ry="8" fill="#269a95"/>
    
    <!-- Audio bar 2 (center-left, tallest) -->
    <rect x="132" y="90" width="80" height="330" rx="10" ry="10" fill="#269a95"/>
    
    <!-- Audio bar 3 (center, shortest) -->
    <rect x="250" y="208" width="74" height="146" rx="10" ry="10" fill="#269793"/>
    
    <!-- Play button triangle -->
    <polygon points="364,134 512,284 364,424" fill="#133c4e"/>
  </g>
  
  <!-- Text "clipcast" -->
  <text x="256" y="570" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-weight="700" font-size="100" fill="#133c4e" letter-spacing="-2">clipcast</text>
</svg>
